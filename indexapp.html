<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pacientes IMO">
<title>Pacientes IMO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1c1c1e;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:17px;font-weight:600;color:#1c1c1e}
.topbar .sync{font-size:12px;color:#8e8e93}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5ea;position:sticky;top:53px;z-index:99}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:500;color:#8e8e93;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#007aff;border-bottom-color:#007aff}
.content{padding:16px;max-width:600px;margin:0 auto}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:#fff;border-radius:12px;padding:12px 14px}
.metric-label{font-size:11px;color:#8e8e93;margin-bottom:2px}
.metric-val{font-size:24px;font-weight:600}
.metric-val.red{color:#ff3b30}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #e5e5ea;background:#fff;font-size:13px;color:#8e8e93;cursor:pointer;white-space:nowrap}
.fbtn.active{background:#007aff;color:#fff;border-color:#007aff}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid transparent}
.card.warn{border-left-color:#ff9500}
.card.danger{border-left-color:#ff3b30}
.card.extra{border-left-color:#ff6b35}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:40px;height:40px;border-radius:50%;background:#e1f0ff;color:#007aff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.cname{font-size:15px;font-weight:600;color:#1c1c1e}
.ccontact{font-size:12px;color:#8e8e93;margin-top:1px}
.cbadges{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
.badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500}
.badge.green{background:#d4f5e2;color:#1a7a3e}
.badge.amber{background:#fff3d4;color:#b8600a}
.badge.red{background:#ffd4d4;color:#a00}
.badge.blue{background:#ddeeff;color:#005fb8}
.badge.gray{background:#f0f0f5;color:#636366}
.card-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;border-top:1px solid #f2f2f7;padding-top:10px;margin-bottom:10px}
.il{color:#8e8e93;margin-bottom:1px}
.iv{color:#1c1c1e;font-weight:500}
.consult-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dots{display:flex;gap:4px}
.dot{width:18px;height:18px;border-radius:50%;background:#f2f2f7;border:1px solid #e5e5ea}
.dot.used{background:#007aff;border-color:#007aff}
.dot.extra{background:#ff3b30;border-color:#ff3b30}
.ctxt{font-size:12px;color:#8e8e93;flex:1}
.btn-add{padding:6px 14px;border-radius:10px;background:#007aff;color:#fff;border:none;font-size:12px;font-weight:500;cursor:pointer}
.btn-del{padding:6px 10px;border-radius:10px;background:#fff0f0;color:#ff3b30;border:1px solid #ffd4d4;font-size:12px;cursor:pointer}
.alert-msg{font-size:12px;padding:6px 10px;border-radius:8px;margin-top:8px}
.alert-msg.amber{background:#fff3d4;color:#b8600a}
.alert-msg.red{background:#ffd4d4;color:#a00}
.alert-msg.coral{background:#ffe8e0;color:#a03000}
.empty{text-align:center;padding:3rem 1rem;color:#8e8e93;font-size:14px}
.form-section{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.form-section h3{font-size:14px;font-weight:600;color:#8e8e93;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:12px}
.field label{font-size:13px;color:#8e8e93;display:block;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid #e5e5ea;border-radius:10px;font-size:15px;background:#fff;color:#1c1c1e;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:#007aff}
.field input[readonly]{background:#f9f9f9;color:#8e8e93}
.info-box{background:#f0f7ff;border-radius:10px;padding:10px 12px;font-size:13px;color:#005fb8;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.btn-primary:active{opacity:.85}
.btn-secondary{width:100%;padding:12px;background:#f2f2f7;color:#1c1c1e;border:none;border-radius:12px;font-size:15px;cursor:pointer;margin-top:8px}
.form-msg{font-size:13px;text-align:center;margin-top:10px}
.loader{text-align:center;padding:2rem;color:#8e8e93;font-size:14px}
.section{display:none}.section.active{display:block}
</style>
</head>
<body>

<div class="topbar">
  <h1>Pacientes IMO</h1>
  <span class="sync" id="sync-status">Conectando...</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('patients')">Pacientes</button>
  <button class="tab" onclick="showTab('add')">+ Novo</button>
</div>

<div class="content">

  <div id="tab-patients" class="section active">
    <div class="metrics" id="metrics">
      <div class="metric"><div class="metric-label">Total</div><div class="metric-val">—</div></div>
      <div class="metric"><div class="metric-label">Com alertas</div><div class="metric-val red">—</div></div>
    </div>
    <div class="filters">
      <button class="fbtn active" onclick="setFilter('todos',this)">Todos</button>
      <button class="fbtn" onclick="setFilter('encerrando',this)">Encerrando</button>
      <button class="fbtn" onclick="setFilter('encerrado',this)">Encerrados</button>
      <button class="fbtn" onclick="setFilter('consultas',this)">Consultas excedidas</button>
    </div>
    <div id="patient-list"><div class="loader">Carregando pacientes...</div></div>
  </div>

  <div id="tab-add" class="section">
    <div class="form-section">
      <h3>Dados do paciente</h3>
      <div class="field"><label>Nome completo</label><input id="f-name" type="text" placeholder="Nome do paciente"></div>
      <div class="field"><label>E-mail</label><input id="f-email" type="email" placeholder="email@exemplo.com"></div>
      <div class="field"><label>Contato (telefone)</label><input id="f-phone" type="tel" placeholder="(61) 99999-9999"></div>
    </div>
    <div class="form-section">
      <h3>Programa</h3>
      <div class="field"><label>Plano</label>
        <select id="f-plan" onchange="updatePlanInfo()">
          <option value="">Selecione...</option>
          <option value="semestral">Plano Semestral — 6 meses / 2 consultas</option>
          <option value="anual">Plano Anual — 12 meses / 5 consultas</option>
        </select>
      </div>
      <div class="field"><label>Data de início</label><input id="f-start" type="date" oninput="calcEnd()"></div>
      <div class="field"><label>Data de término (calculada)</label><input id="f-end" type="text" readonly placeholder="—"></div>
      <div id="plan-info" class="info-box" style="display:none"></div>
    </div>
    <button class="btn-primary" onclick="addPatient()">Cadastrar paciente</button>
    <button class="btn-secondary" onclick="clearForm()">Limpar</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC30hLOPmj04lZUQtdKEAt7OqQQioThcFs",
  authDomain: "programas-imo.firebaseapp.com",
  projectId: "programas-imo",
  storageBucket: "programas-imo.firebasestorage.app",
  messagingSenderId: "1033939993776",
  appId: "1:1033939993776:web:242dbe8875706a9c196775"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "pacientes");

let patients = [];
let filterMode = 'todos';

document.getElementById('sync-status').textContent = 'Sincronizando...';

onSnapshot(colRef, snap => {
  patients = snap.docs.map(d => ({id: d.id, ...d.data()}));
  document.getElementById('sync-status').textContent = 'Sincronizado';
  renderList();
  renderMetrics();
}, err => {
  document.getElementById('sync-status').textContent = 'Erro de conexão';
  console.error(err);
});

window.showTab = (t) => {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['patients','add'][i]===t));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
};

window.setFilter = (f, el) => {
  filterMode = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
};

window.updatePlanInfo = () => {
  const p = document.getElementById('f-plan').value;
  const box = document.getElementById('plan-info');
  if(!p){box.style.display='none';return;}
  box.style.display='block';
  box.textContent = p==='semestral' ? 'Plano Semestral: 6 meses com 2 consultas inclusas.' : 'Plano Anual: 12 meses com 5 consultas inclusas.';
  calcEnd();
};

window.calcEnd = () => {
  const s = document.getElementById('f-start').value;
  const p = document.getElementById('f-plan').value;
  const ef = document.getElementById('f-end');
  if(!s||!p){ef.value='';return;}
  const d = new Date(s+'T12:00:00');
  d.setMonth(d.getMonth()+(p==='semestral'?6:12));
  ef.value = d.toLocaleDateString('pt-BR');
};

window.addPatient = async () => {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const plan = document.getElementById('f-plan').value;
  const start = document.getElementById('f-start').value;
  const msg = document.getElementById('form-msg');
  if(!name||!email||!phone||!plan||!start){
    msg.style.color='#ff3b30'; msg.textContent='Preencha todos os campos.'; return;
  }
  const d = new Date(start+'T12:00:00');
  d.setMonth(d.getMonth()+(plan==='semestral'?6:12));
  const endDate = d.toISOString().split('T')[0];
  try {
    await addDoc(colRef, {name, email, phone, plan, startDate: start, endDate, consults: 0, createdAt: serverTimestamp()});
    msg.style.color='#34c759'; msg.textContent='Paciente cadastrado!';
    setTimeout(()=>{clearForm(); window.showTab('patients');}, 800);
  } catch(e){
    msg.style.color='#ff3b30'; msg.textContent='Erro ao salvar. Tente novamente.';
  }
};

window.clearForm = () => {
  ['f-name','f-email','f-phone','f-start'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-plan').value='';
  document.getElementById('f-end').value='';
  document.getElementById('plan-info').style.display='none';
  document.getElementById('form-msg').textContent='';
};

window.addConsult = async (id) => {
  const p = patients.find(x => x.id===id);
  if(!p) return;
  await updateDoc(doc(db,'pacientes',id), {consults: (p.consults||0)+1});
};

window.removePatient = async (id) => {
  if(!confirm('Remover este paciente?')) return;
  await deleteDoc(doc(db,'pacientes',id));
};

function initials(name){
  return name.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function getDaysLeft(endDate){
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(endDate+'T12:00:00');
  return Math.round((end-today)/(1000*60*60*24));
}

function planStatus(p){
  const d = getDaysLeft(p.endDate);
  if(d<0) return 'encerrado';
  if(d<=30) return 'encerrando';
  return 'ativo';
}

function consultStatus(p){
  const max = p.plan==='semestral'?2:5;
  if(p.consults>max) return 'excedido';
  if(p.consults===max) return 'limite';
  return 'ok';
}

function renderMetrics(){
  const total = patients.length;
  const alertas = patients.filter(p => {
    const ps=planStatus(p), cs=consultStatus(p);
    return ps==='encerrando'||ps==='encerrado'||cs==='excedido';
  }).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total de pacientes</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">Com alertas</div><div class="metric-val red">${alertas}</div></div>
  `;
}

function renderList(){
  const list = document.getElementById('patient-list');
  let filtered = patients.filter(p => {
    const ps=planStatus(p), cs=consultStatus(p);
    if(filterMode==='todos') return true;
    if(filterMode==='encerrando') return ps==='encerrando';
    if(filterMode==='encerrado') return ps==='encerrado';
    if(filterMode==='consultas') return cs==='excedido';
    return true;
  });
  if(!filtered.length){list.innerHTML='<div class="empty">Nenhum paciente encontrado.</div>';return;}

  list.innerHTML = filtered.map(p => {
    const ps=planStatus(p), cs=consultStatus(p);
    const max=p.plan==='semestral'?2:5;
    const daysLeft=getDaysLeft(p.endDate);
    let cardClass='card';
    if(cs==='excedido') cardClass+=' extra';
    else if(ps==='encerrado') cardClass+=' danger';
    else if(ps==='encerrando') cardClass+=' warn';

    const planBadge = ps==='ativo'?'<span class="badge green">Ativo</span>':ps==='encerrando'?'<span class="badge amber">Encerrando</span>':'<span class="badge red">Encerrado</span>';
    const planLabel = p.plan==='semestral'?'<span class="badge blue">Semestral</span>':'<span class="badge blue">Anual</span>';

    const maxDots = Math.max(max, p.consults);
    const dots = Array.from({length:maxDots}).map((_,i)=>{
      if(i<p.consults && i<max) return '<div class="dot used"></div>';
      if(i>=max && i<p.consults) return '<div class="dot extra"></div>';
      return '<div class="dot"></div>';
    }).join('');

    let alertHtml='';
    if(cs==='excedido') alertHtml+=`<div class="alert-msg coral">${p.consults} consultas realizadas / ${max} inclusas. Consulta extra.</div>`;
    else if(cs==='limite') alertHtml+=`<div class="alert-msg amber">Todas as consultas do plano foram utilizadas.</div>`;
    if(ps==='encerrando'&&daysLeft>=0) alertHtml+=`<div class="alert-msg amber">Plano encerra em ${daysLeft} dia${daysLeft!==1?'s':''}. Faça o follow-up!</div>`;
    if(ps==='encerrado') alertHtml+=`<div class="alert-msg red">Plano encerrado há ${Math.abs(daysLeft)} dia${Math.abs(daysLeft)!==1?'s':''}.</div>`;

    const startFmt = new Date(p.startDate+'T12:00:00').toLocaleDateString('pt-BR');
    const endFmt = new Date(p.endDate+'T12:00:00').toLocaleDateString('pt-BR');

    return `<div class="${cardClass}">
      <div class="card-top">
        <div class="avatar">${initials(p.name)}</div>
        <div>
          <div class="cname">${p.name}</div>
          <div class="ccontact">${p.phone}</div>
          <div class="ccontact">${p.email}</div>
        </div>
        <div class="cbadges">${planLabel}${planBadge}</div>
      </div>
      <div class="card-info">
        <div><div class="il">Início</div><div class="iv">${startFmt}</div></div>
        <div><div class="il">Término</div><div class="iv">${endFmt}</div></div>
        <div><div class="il">Dias restantes</div><div class="iv">${daysLeft>=0?daysLeft+' dias':'Encerrado'}</div></div>
      </div>
      <div class="consult-row">
        <div class="dots">${dots}</div>
        <span class="ctxt">${p.consults}/${max} consultas</span>
        <button class="btn-add" onclick="addConsult('${p.id}')">+ Consulta</button>
        <button class="btn-del" onclick="removePatient('${p.id}')">Remover</button>
      </div>
      ${alertHtml}
    </div>`;
  }).join('');
}

const today = new Date().toISOString().split('T')[0];
document.getElementById('f-start').value = today;
</script>
</body>
</html>
